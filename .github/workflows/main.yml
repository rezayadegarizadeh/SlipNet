name: SlipNet Collector (TXT)

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests

      - name: Run SlipNet collector
        run: python scraper.py

      - name: Commit and push output
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # استفاده از نقل قول برای نام فایل با کاراکترهای خاص
          git add '☬SHΞN™.txt'
          # اگر تغییری وجود نداشته باشد (با وجود به‌روز شدن timestamps همیشه تغییر دارد) commit می‌کنیم
          git diff --quiet && git diff --staged --quiet || git commit -m "Next refresh less than 10min "
          git push origin main --force-with-lease
